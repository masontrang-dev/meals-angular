<div class="modal-overlay" (click)="onBackdropClick()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Add Dining Out</h2>
      <button 
        class="close-btn"
        (click)="onCancel()"
        type="button"
        aria-label="Close modal">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <label for="restaurant-name" class="input-label">Restaurant Name</label>
      <input
        id="restaurant-name"
        type="text"
        [(ngModel)]="restaurantName"
        placeholder="e.g., Chipotle, In-N-Out"
        class="restaurant-input"
        (keyup.enter)="onSave()"
        autofocus
      />
    </div>

    <div class="modal-footer">
      <button 
        class="btn btn-secondary"
        (click)="onCancel()"
        type="button">
        Cancel
      </button>
      <button 
        class="btn btn-primary"
        (click)="onSave()"
        [disabled]="!restaurantName.trim()"
        type="button">
        Add to Plan
      </button>
    </div>
  </div>
</div>
