<div class="modal-overlay" (click)="onCancel()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Add "{{ recipeTitle() }}" to...</h2>
      <button class="close-button" (click)="onCancel()" type="button" aria-label="Close meal slot picker">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <p class="instruction-text">Select a meal slot to add this recipe:</p>
      
      <div class="slots-grid">
        @for (day of days; track day) {
          <div class="day-column">
            <h3 class="day-header">{{ day }}</h3>
            <div class="meal-slots">
              @for (mealType of mealTypes; track mealType) {
                <button 
                  class="slot-button"
                  (click)="onSlotClick(day, mealType)"
                  type="button"
                  [attr.aria-label]="'Add to ' + day + ' ' + mealType">
                  {{ getMealTypeLabel(mealType) }}
                </button>
              }
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</div>
